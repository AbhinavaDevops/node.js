# Create EC2 instance and security group to allow HTTP traffic 
 MyEc2:
  Type: aws::ec2::instance
  Properties:
   Instancetype: t3.micro
   Imageid: ami-0ec10929233384c7f
   Keyname: WebServer
   SecurityGroups:
    - !Ref MySG

  MySG:
   Type: AWS::EC2::SecurityGroup
   properties:
    GroupDescription: Allow HTTP
    SecurityGroupIngress:
      - IpProtocol: tcp
        FromPort: 80
        ToPort: 80
        CidrIp: 0.0.0.0/0 

